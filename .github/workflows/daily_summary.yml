name: Daily NGI Summary

on:
  schedule:
    # 台灣時間早上 7:00 = UTC 前一天 23:00
    - cron: '0 23 * * 0-4'  # UTC 週日~週四（= 台灣週一~週五早上 7:00）
  workflow_dispatch:  # 允許手動觸發（測試用）

jobs:
  run-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install anthropic requests playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run summary script
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          NGI_USERNAME: ${{ secrets.NGI_USERNAME }}
          NGI_PASSWORD: ${{ secrets.NGI_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_PAT: ${{ secrets.MY_GITHUB_PAT }}
        run: python main.py

      - name: Upload debug screenshot (if exists)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: debug_login.png
          if-no-files-found: ignore
