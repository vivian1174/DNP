name: Send LINE Broadcast

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Message to broadcast'
        required: true
        type: string

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send LINE broadcast
        run: |
          curl -X POST https://api.line.me/v2/bot/message/broadcast \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}" \
            -d "{\"messages\":[{\"type\":\"text\",\"text\":$(echo '${{ inputs.message }}' | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}]}"
